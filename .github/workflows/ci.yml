name: CI — ALLOUL&Q

on:
  push:
    branches: [main, ui/prototype-alignment]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (TypeScript + Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - name: TypeScript check
        run: NODE_OPTIONS="--max-old-space-size=8192" npx tsc --noEmit || true
      - name: Jest
        run: npx jest --passWithNoTests || true

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - name: Run pytest
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          ENVIRONMENT: test
          ALLOW_CREATE_ALL: "1"
        run: pytest tests/ -v || true
