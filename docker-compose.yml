# تشغيل API محليًا ثم اربط التطبيق بـ EXPO_PUBLIC_API_URL
# مثال بعد ngrok: EXPO_PUBLIC_API_URL=https://abc123.ngrok-free.app
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
