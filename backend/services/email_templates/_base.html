<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$brand</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f7;padding:32px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,$primary 0%,#8B5CF6 100%);padding:32px 32px 24px 32px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:900;letter-spacing:0.5px;">$brand</h1>
              <p style="margin:8px 0 0 0;color:rgba(255,255,255,0.85);font-size:13px;">منصة الأعمال الذكية</p>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:36px 32px;color:#0F172A;line-height:1.7;font-size:15px;">
              $content
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:24px 32px;background:#f8fafc;border-top:1px solid #e5e7eb;text-align:center;color:#71717a;font-size:12px;line-height:1.6;">
              <p style="margin:0 0 6px 0;">© $year $brand. جميع الحقوق محفوظة.</p>
              <p style="margin:0;">
                <a href="https://$domain" style="color:$primary;text-decoration:none;">$domain</a>
                &nbsp;·&nbsp;
                <a href="https://$domain/support" style="color:$primary;text-decoration:none;">الدعم</a>
                &nbsp;·&nbsp;
                <a href="https://$domain/privacy" style="color:$primary;text-decoration:none;">الخصوصية</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
